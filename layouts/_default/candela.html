{{ define "main" }}

<section class="section candela-page">

  <div class="container candela-intro-wrapper">
    <h1 class="page-title">
      {{ .Title }}
    </h1>

    <div class="candela-intro">
      {{ .Content }}
    </div>
  </div>

  <div class="poetic-separator">✧ ✦ ✧</div>

  <div class="candle-story-link">
    <p class="story-phrase">
      Ogni candela ha una storia. La mia inizia così.
    </p>
  
    <a href="/candele/incontro-con-la-luce/" class="story-link">
      Il mio incontro con la Luce →
    </a>
  </div>

  {{ if .Params.gallery }}
<div class="candela-gallery-full">
  {{ range .Params.gallery }}
    <div class="gallery-item">
      <img 
        src="{{ . }}" 
        alt="{{ $.Title }}" 
        class="zoomable"
      >
    </div>
  {{ end }}
</div>
{{ end }}

</section>

{{ end }}
