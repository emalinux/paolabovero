<!DOCTYPE html>
<html lang="it">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  {{ partial "header.html" . }}


  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}

<script>
let currentIndex = 0;
let images = [];

document.addEventListener("DOMContentLoaded", function() {

  const zoomables = document.querySelectorAll('.zoomable');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  zoomables.forEach((img, index) => {
    images.push(img.src);

    img.addEventListener('click', function() {
      currentIndex = index;
      lightbox.classList.add('active');
      lightboxImg.src = images[currentIndex];
      document.body.style.overflow = 'hidden';
    });
  });

  window.nextImage = function() {
    currentIndex = (currentIndex + 1) % images.length;
    lightboxImg.src = images[currentIndex];
  }

  window.prevImage = function() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    lightboxImg.src = images[currentIndex];
  }

  lightbox.addEventListener('click', function(e) {
    if (!e.target.classList.contains('lightbox-img') &&
        !e.target.classList.contains('nav-arrow')) {
      closeLightbox();
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
  });

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = 'auto';
  }

});
</script>

<div id="lightbox" class="lightbox">
  <span class="nav-arrow left" onclick="prevImage()">‹</span>
  <img id="lightbox-img" class="lightbox-img" src="">
  <span class="nav-arrow right" onclick="nextImage()">›</span>
</div>
</body>
</html>
