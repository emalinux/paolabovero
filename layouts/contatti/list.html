{{ define "main" }}

<section class="contact-hero">

  <h1>Contatti</h1>

  <p class="contact-tagline">
    « Ogni parola è un ponte. Se senti il desiderio di attraversarlo, scrivimi. »
  </p>

</section>


<section class="contact-info">

  <div class="contact-direct">

    <p class="contact-email">
      📩 <a href="mailto:info@paolabovero.com">
        info@paolabovero.com
      </a>
    </p>

    <p class="contact-social">
      ✧ Instagram: <a href="#">@paolabovero</a>
    </p>

  </div>

</section>


<section class="contact-form-section">

  <form name="contatti" method="POST" data-netlify="true">

    <div class="form-group">
      <input type="text" name="nome" placeholder="Il tuo nome" required>
    </div>

    <div class="form-group">
      <input type="email" name="email" placeholder="La tua email" required>
    </div>

    <div class="form-group">
      <textarea name="messaggio" rows="5" placeholder="Il tuo messaggio" required></textarea>
    </div>

    <button type="submit" class="contact-btn">
      Invia il messaggio
    </button>

  </form>

</section>

{{ end }}
